<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSkyOfficial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Rubik', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7fa; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1d1d1f;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            padding: 50px 24px 1px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            position: relative;
        }

        @media (min-width: 480px) {
            .container { min-height: auto; border-radius: 40px; margin: 40px 0; }
        }

        /* GoSky */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-title {
            font-family: 'Rubik', sans-serif;
            font-size: 68px;
            font-weight: 900;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .sparkle {
            position: absolute;
            animation: twinkle 2s infinite ease-in-out alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* 下载键 */
        .download-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            border: none;
            outline: none;
            color: white; 
        }

        .download-circle svg {
            width: 48px;
            height: 48px;
            margin-top: 8px;
        }

        .download-circle:active {
            transform: scale(0.9);
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.2);
        }

        .version-tag {
            font-size: 14px;
            color: #86868b;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 卡片 */
        .app-card {
            background: linear-gradient(145deg, #f0f7ff, #ffffff);
            border-radius: 30px;
            padding: 25px;
            margin: 25px 0;
            border: 1px solid #eef2f6;
        }

        .card-title { font-size: 36px; font-weight: 800;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin-left: 6px; }
        
        .card-version {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
        
        .icon-stack {
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .icon-box {
            width: 85px; 
            height: 85px; 
            background: #fff; 
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            position: absolute;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        /* 图片 */
        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .icon-box:first-child { transform: translateX(-30px) scale(0.9); opacity: 0.6; }
        .icon-box:last-child { transform: translateX(25px); z-index: 2;
        }

        .card-footer {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            margin-top: 15px;
            padding-left: 5px;
            align-items: baseline;
        }
        .footer-link {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .link-blue { color: #0066cc; }
        .link-gray { color: #86868b; font-weight: 400; }

        /* 快速指南 */
        .guide-section { text-align: center; margin-top: 45px; }
        .guide-title-wrapper { position: relative; display: inline-block; margin-bottom: 25px; }
        .guide-title { font-size: 42px; font-weight: 800; }

        .guide-btn {
            display: block;
            background: #f5f5f7;
            color: #1d1d1f;
            text-decoration: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .guide-btn:active { background: #e8e8ed; transform: scale(0.98); }

        .bottom-nav {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px dashed #d1d5db;
        }
        .social-list { color: #86868b; font-size: 14px; margin-bottom: 15px; letter-spacing: 1px; }
        
        .go-link {
            display: inline-block; 
            color: #000000;
            text-decoration: none;
            font-weight: 430;
            line-height: 1.3;
            padding: 10px 20px;
            background: #f5f5f7;
            border-radius: 18px;
            transition: all 0.2s;
        }
        .go-link:active {
            transform: scale(0.96);
            background: #e0efff;
        }
        
        /* 加入频道 */
        .channel-block {
            margin-top: 20px;
            text-align: center;
        }
        .channel-hint {
            font-size: 13px;
            color: #8e8e93;
            background: #f8f9fc;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .channel-btn {
            display: block;
            background: #3b82f6;
            color: #ffffff;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .channel-btn:active {
            background: #3b82f6;
            transform: scale(0.98);
        }
        
        /* 声明 */
        .copyright {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            font-size: 13px;
            color: #a1a1a6;
            border-top: 1px solid #eceef2;
            letter-spacing: 0.3px;
            font-weight: 400;
        }
        
        /* 通行动画 */
        .card-footer .footer-link.link-blue {
            transition: all 0.2s ease;
        }
        .card-footer .footer-link.link-blue:active {
            transform: scale(0.96);
            background: #e0efff !important;
        }
    </style>
</head>
